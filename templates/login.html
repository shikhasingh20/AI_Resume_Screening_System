{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-dark text-white text-center">
                <h3>Login</h3>
            </div>

            <div class="card-body p-4">

                <form method="POST" action="/login">

                    <!-- Email -->

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            aria-label="Email Address"
                            required
                        >
                    </div>

                    <!-- Password -->

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            aria-label="Password"
                            required
                        >
                    </div>

                    <!-- Remember Me -->

                    <div class="form-check mb-3">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="remember"
                            name="remember"
                        >

                        <label class="form-check-label" for="remember">
                            Remember Me
                        </label>
                    </div>

                    <!-- Login Button -->

                    <div class="d-grid">
                        <button
                            type="submit"
                            class="btn btn-primary btn-lg"
                        >
                            Login
                        </button>
                    </div>

                </form>

                <hr>

                <div class="text-center">

                    <p>
                        Don't have an account?
                        <a href="/register">
                            Register Here
                        </a>
                    </p>

                    <a href="/forgot-password">
                        Forgot Password?
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
