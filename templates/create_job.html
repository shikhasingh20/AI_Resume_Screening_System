{% extends 'base.html' %}

{% block title %}Create Job{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-dark text-white">
        <h3>Create Job</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label for="title" class="form-label">
                    Job Title
                </label>

                <input type="text"
                       id="title"
                       name="title"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label for="skills" class="form-label">
                    Required Skills
                </label>

                <input type="text"
                       id="skills"
                       name="skills"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label for="description"
                       class="form-label">
                    Description
                </label>

                <textarea id="description"
                          name="description"
                          rows="5"
                          class="form-control"></textarea>
            </div>

            <button class="btn btn-success">
                Create Job
            </button>

        </form>

    </div>

</div>

{% endblock %}
