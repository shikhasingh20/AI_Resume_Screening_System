{% extends 'base.html' %}

{% block title %}Upload Resume{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3>Upload Resume</h3>
            </div>

            <div class="card-body">

                <form method="POST"
                      enctype="multipart/form-data">

                    <div class="mb-3">

                        <label for="resume"
                               class="form-label">
                            Choose Resume
                        </label>

                        <input type="file"
                               id="resume"
                               name="resume"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-primary w-100">
                        Upload
                    </button>

                </form>

            </div>

        </div>

    </div>
    <p id="filename" class="mt-3 text-success"></p>

</div>

{% endblock %}
